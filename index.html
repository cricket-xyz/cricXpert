<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CricXpert</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#d9ecff,#e9ffe3);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.card {
  background: #fff;
  width: 90%;
  max-width: 360px;
  border-radius: 25px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}

/* Logo */
.logo {
  width: 95px;
  height: 95px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #eee;
}

/* Text */
h1 {
  margin: 12px 0 5px;
  font-size: 24px;
}

.subs {
  color: #666;
  font-size: 14px;
  margin-bottom: 15px;
}

.desc {
  font-size: 15px;
  line-height: 1.5;
  margin-bottom: 20px;
}

/* Button */
.btn {
  display: inline-block;
  padding: 14px 28px;
  border-radius: 30px;
  background: linear-gradient(90deg,#00c6ff,#0072ff);
  color: white;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  box-shadow: 0 8px 20px rgba(0,123,255,0.4);
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.05);}
  100% {transform: scale(1);}
}

/* Finger */
.finger {
  font-size: 28px;
  margin-top: 10px;
  animation: upDown 1s infinite;
}

@keyframes upDown {
  0% {transform: translateY(0);}
  50% {transform: translateY(-12px);}
  100% {transform: translateY(0);}
}

/* Timer */
.timer-box {
  margin-top: 10px;
  background: #fff3f3;
  color: #ff0000;
  padding: 8px;
  border-radius: 10px;
  font-weight: bold;
  display: inline-block;
  font-size: 15px;
}

/* Footer */
.footer {
  margin-top: 12px;
  font-size: 13px;
  color: #777;
}
</style>
</head>

<div class="desc">
Market Mai Aagaya Huin 😎 <br>

</div>

<div class="timer-box">
⏳ Offer Ends In: <span id="timer">02:00</span>
</div>

<div class="footer">
⚠️ Limited Slots Left — Join Fast!
</div>

</div>

<script>
let time = 120;

let timer = document.getElementById("timer");

let x = setInterval(function() {
  let m = Math.floor(time / 60);
  let s = time % 60;

  if(s < 10) s = "0" + s;

  timer.innerHTML = m + ":" + s;

  time--;

  if(time < 0){
    clearInterval(x);
    timer.innerHTML = "Expired ❌";
    document.querySelector(".btn").style.opacity = "0.5";
    document.querySelector(".btn").innerHTML = "JOIN CLOSED";
  }
},1000);
</script>
