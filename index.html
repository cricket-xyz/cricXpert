<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CricXpert 🚀</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f172a, #000);
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 20px;
    }

    /* Profile */
    .logo {
      width: 130px;
      height: 130px;
      margin: 30px auto;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(45deg, #00ffcc, #00c853, #00bcd4);
      animation: glow 3s infinite linear;
    }

    .logo img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #000;
    }

    @keyframes glow {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    h1 {
      font-size: 30px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .sub {
      color: #aaa;
      margin-bottom: 5px;
    }

    .id {
      color: #666;
      font-size: 13px;
      margin-bottom: 15px;
    }

    .members {
      color: #00e676;
      font-size: 14px;
      margin-bottom: 20px;
    }

    /* Buttons */
    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 20px;
      border-radius: 15px;
      margin-top: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      text-align: left;
    }

    .card h2 {
      font-size: 20px;
      margin-bottom: 10px;
    }

    .card p {
      color: #ccc;
      font-size: 14px;
    }

    /* CTA */
    .cta {
      margin-top: 25px;
      padding: 15px;
      width: 100%;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, #00c853, #00e676);
      color: #000;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .cta:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #00e676;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- Profile -->
  <div class="logo">
    <img src="https://i.ibb.co/LXb505YY/IMG-20260320-165946-160.jpg">
  </div>

  <h1>CricXpert 🏏</h1>
  <div class="sub">Private Channel</div>
  <div class="id">ID: 1635915520</div>

  <div class="members">🔥 120,548+ Members Joined</div>

  <!-- Buttons -->
  <div class="buttons">
    <button class="btn">📡 Live</button>
    <button class="btn">🔊 Unmute</button>
    <button class="btn">➕ Story</button>
  </div>

  <!-- Card -->
  <div class="card">
    <h2>🚀 No.1 Cricket Trader</h2>
    <p>💰 Always Free Cricket Trading Tips  
    <br>📊 90%+ Accuracy Signals  
    <br>⚡ Instant Match Updates</p>
  </div>

  <!-- CTA -->
  <button class="cta" onclick="joinNow()">JOIN TELEGRAM</button>

</div>

<script>
  function joinNow() {
    window.location.href = "https://telegram.me/+uikBj9p6KtA1YWQ1"; // change this
  }
</script>

</body>
</html>
